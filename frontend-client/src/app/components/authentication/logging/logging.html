<div class="login-container" style="max-width: 400px; margin: 60px auto; padding: 25px; border: 1px solid #e2e8f0; border-radius: 8px;">
  <h2>System Authentication</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
    <div style="margin-bottom: 15px;">
      <label style="display:block; margin-bottom:5px;">User Code or Email Address</label>
      <input type="text" formControlName="login_identifier" placeholder="e.g. DR2814 or mail@domain.com" style="width:100%; padding:8px;" />
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display:block; margin-bottom:5px;">Security Password</label>
      <input type="password" formControlName="password" style="width:100%; padding:8px;" />
    </div>

    <button type="submit" [disabled]="loginForm.invalid" style="width:100%; padding:10px; background:#1A365D; color:white; border:none; cursor:pointer;">Sign In</button>
  </form>
</div>
