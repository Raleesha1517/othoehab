<nav class="nav" [class.mobile-menu-active]="isMobileMenuOpen">
  
  <div class="nav-header">
    <a [routerLink]="homeRoute" class="brand">
      <img src="images/logo2.png" alt="Health Awareness Logo" class="logo"
           style="height: 60px; width: 100px; object-fit: contain;" />
    </a>

    <button class="nav-toggle" (click)="toggleMobileMenu()" aria-label="Toggle navigation">
      <i class="ti" [ngClass]="isMobileMenuOpen ? 'ti-x' : 'ti-menu-2'"></i>
    </button>
  </div>

  <div class="nav-menu">
    <div class="nav-start">
      <div class="nav-sep hide-on-mobile"></div>

      <a *ngIf="isLoggedIn && role === 'admin'"
         routerLink="/admin-dashboard"
         class="nav-link"
         (click)="isMobileMenuOpen = false">
        <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
        Admin Dashboard
      </a>
      <a *ngIf="isLoggedIn && role === 'doctor'"
         routerLink="/doctor-dashboard"
         class="nav-link"
         (click)="isMobileMenuOpen = false">
        <i class="ti ti-stethoscope" aria-hidden="true"></i>
        Doctor Dashboard
      </a>
      <a *ngIf="isLoggedIn && role === 'hr'"
         routerLink="/hr-dashboard"
         class="nav-link"
         (click)="isMobileMenuOpen = false">
        <i class="ti ti-users" aria-hidden="true"></i>
        HR Dashboard
      </a>
      <a *ngIf="isLoggedIn && role === 'patient'"
         routerLink="/patient-dashboard"
         class="nav-link"
         (click)="isMobileMenuOpen = false">
        <i class="ti ti-heart-rate-monitor" aria-hidden="true"></i>
        Patient Dashboard
      </a>
      <a *ngIf="isLoggedIn && role === 'patient'"
         routerLink="/patient-massage"
         class="nav-link"
         (click)="isMobileMenuOpen = false">
        <i class="ti ti-heart-rate-monitor" aria-hidden="true"></i>
        Massage
      </a>

      <a *ngIf="isLoggedIn && role === 'doctor'"
         routerLink="/exercises"
         class="nav-link"
         (click)="isMobileMenuOpen = false">
        <i class="ti ti-fitness" aria-hidden="true"></i>
        Exercises
      </a>

      <a *ngIf="isLoggedIn && role === 'doctor'"
          routerLink="/doctor-template"
          routerLinkActive="active"
          class="nav-link"
          (click)="isMobileMenuOpen = false">
          <i class="ti ti-file-description" aria-hidden="true"></i>
          Clinical Templates
        </a>
    </div>

    <div class="nav-end">
      <ng-container *ngIf="isLoggedIn">
        <div class="user-info">
          <div class="user-avatar">
            <i class="ti ti-user-circle" aria-hidden="true"></i>
          </div>
          <div class="user-meta">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role">{{ role | uppercase }}</span>
          </div>
        </div>
        <div class="nav-sep hide-on-mobile"></div>
        <button class="btn-logout" (click)="logout(); isMobileMenuOpen = false">
          <i class="ti ti-logout" aria-hidden="true"></i>
          Sign Out
        </button>
      </ng-container>

      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/" class="btn-login-nav" (click)="isMobileMenuOpen = false">
          <i class="ti ti-login" aria-hidden="true"></i>
          Login
        </a>
        </ng-container>
        <!-- <a routerLink="/register" class="nav-link" (click)="isMobileMenuOpen = false">Register</a> -->
    </div>
  </div>


</nav>
