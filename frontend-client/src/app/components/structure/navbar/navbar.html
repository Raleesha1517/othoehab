<nav class="navbar" style="display:flex; justify-content:space-between; align-items:center; padding:10px 18px; background:#1A365D; color:white;">
  <div style="display:flex; align-items:center; gap:14px;">
    <a routerLink="/" style="color:white; text-decoration:none; font-weight:700;">Health Awareness</a>
    <a *ngIf="isLoggedIn && role === 'admin'" routerLink="/admin-dashboard" style="color:white; text-decoration:none;">Admin Dashboard</a>
    <a *ngIf="isLoggedIn && role === 'doctor'" routerLink="/doctor-dashboard" style="color:white; text-decoration:none;">Doctor Dashboard</a>
    <a *ngIf="isLoggedIn && role === 'hr'" routerLink="/hr-dashboard" style="color:white; text-decoration:none;">HR Dashboard</a>
    <a *ngIf="isLoggedIn && role === 'patient'" routerLink="/patient-dashboard" style="color:white; text-decoration:none;">Patient Dashboard</a>
  </div>
  <div style="display:flex; align-items:center; gap:10px;">
    <span *ngIf="isLoggedIn" style="font-size:0.95rem; opacity:0.9;">{{ role | uppercase }}</span>
    <button *ngIf="isLoggedIn" (click)="logout()" style="padding:8px 14px; background:#E53E3E; border:none; border-radius:6px; color:white; cursor:pointer;">Logout</button>
    <a *ngIf="!isLoggedIn" routerLink="/" style="color:white; text-decoration:none;">Login</a>
  </div>
</nav>
